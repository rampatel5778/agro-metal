# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: agro-metal
    runtime: static
    repo: https://github.com/rampatel5778/agro-metal
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: '22.12.0'
      - key: NPM_CONFIG_PRODUCTION
        value: 'false'
